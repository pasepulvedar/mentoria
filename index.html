<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Mentor.ia — Prototipo móvil</title>
  <link rel="stylesheet" href="design/colors_and_type.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="design/mentoria-logo.png">
  <style>
    html, body { margin: 0; padding: 0; background: var(--paper-50); height: 100%; overflow: hidden; }
    body { height: 100%; }
    #root { width: 100%; height: 100%; }
    button { font-family: var(--font-sans); }
    input, textarea { font-family: var(--font-sans); }

    /* ---------- App-scoped helpers ---------- */
    .app-scroll {
      width: 100%; flex: 1; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      background: var(--paper-50);
      -webkit-overflow-scrolling: touch;
    }
    .app-scroll::-webkit-scrollbar { width: 0; height: 0; }
    .scroll-hide { scrollbar-width: none; -ms-overflow-style: none; }
    .scroll-hide::-webkit-scrollbar { display: none; }

    .pressable { transition: transform 120ms var(--ease-out), background 140ms var(--ease-out), box-shadow 140ms var(--ease-out); }
    .pressable:active { transform: scale(0.98); }

    /* Pulse animation for streak fire */
    @keyframes firePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(242,137,27,0)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 6px rgba(242,137,27,0.45)); }
    }
    .fire-pulse { animation: firePulse 1.8s ease-in-out infinite; transform-origin: center; }

    /* XP pill float-up */
    @keyframes xpFloat {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.85); }
      15% { opacity: 1; transform: translate(-50%, -8px) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -32px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -52px) scale(0.95); }
    }
    .xp-float { animation: xpFloat 1.6s var(--ease-out) forwards; }

    /* Screen transitions */
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-in { animation: screenIn 280ms var(--ease-out); }

    /* Toast slide */
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 14px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-in { animation: toastIn 260ms var(--ease-out); }

    /* Modal */
    @keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .scrim-in { animation: scrimIn 220ms var(--ease-out); }
    .modal-in { animation: modalIn 320ms var(--ease-spring); }

    /* Typing dots */
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    .typing-dot { animation: typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* Level-up burst */
    @keyframes burst {
      0% { transform: scale(0.2); opacity: 0; }
      40% { opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .burst { animation: burst 1.4s var(--ease-out) infinite; }

    /* Logo gentle float */
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-4px) rotate(3deg); }
    }
    .logo-float { animation: logoFloat 3.2s ease-in-out infinite; transform-origin: center; }

    /* Rank rise indicator */
    @keyframes rankRise {
      0% { transform: translateY(8px); opacity: 0; }
      30% { transform: translateY(0); opacity: 1; }
      80% { transform: translateY(-4px); opacity: 1; }
      100% { transform: translateY(-12px); opacity: 0; }
    }
    .rank-rise { animation: rankRise 1.6s var(--ease-out) forwards; }

    /* Radar dash draw */
    @keyframes dashDraw {
      from { stroke-dashoffset: 600; }
      to   { stroke-dashoffset: 0; }
    }

    /* Progress bar fill */
    @keyframes barFill { from { width: 0%; } }
    .bar-fill > div { animation: barFill 900ms var(--ease-out); }

    /* ───────── Duolingo-style 3D button ───────── */
    .btn-3d {
      position: relative;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: transform 80ms ease, box-shadow 80ms ease, filter 120ms ease;
      transform: translateY(0);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-3d:hover { filter: brightness(1.06); }
    .btn-3d:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 0 var(--btn-shadow) !important;
    }
    .btn-3d:disabled {
      filter: grayscale(0.4) brightness(0.95);
      cursor: not-allowed;
    }
    .btn-3d-navy { background: var(--navy-900); color: #fff; --btn-shadow: var(--navy-950); }
    .btn-3d-tide { background: var(--tide-500); color: #fff; --btn-shadow: var(--tide-700); }
    .btn-3d-lift { background: var(--lift-500); color: #fff; --btn-shadow: var(--lift-700); }
    .btn-3d-paper {
      background: var(--paper-0); color: var(--navy-900);
      --btn-shadow: var(--paper-300);
      border: 1.5px solid var(--paper-200) !important;
    }
    .btn-3d {
      box-shadow: 0 4px 0 0 var(--btn-shadow);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
